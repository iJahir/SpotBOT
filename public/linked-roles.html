<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación de Roles Vinculados - Bot Music Discord</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: rgba(255, 255, 255, 0.05);
      --primary-color: #1DB954;
      --secondary-color: #45f3ff;
      --text-color: #c5c6c7;
      --title-color: #ffffff;
    }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
      background-image: radial-gradient(circle at 10% 20%, rgba(29, 185, 84, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(69, 243, 255, 0.1) 0%, transparent 40%);
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      text-align: center;
    }
    h1 {
      color: var(--title-color);
      font-size: 2rem;
      margin-top: 0;
      border-bottom: 2px solid var(--primary-color);
      padding-bottom: 10px;
    }
    p {
      line-height: 1.6;
      font-size: 1rem;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      background: var(--primary-color);
      color: white;
      padding: 12px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .btn:hover {
      background: #1aa34a;
      transform: translateY(-2px);
    }
    .footer {
      margin-top: 40px;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.3);
    }
    .footer a {
      color: var(--primary-color);
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 Verificación de Roles Vinculados</h1>
    <p>Vincula tu cuenta para verificar tus roles de servidor en Discord. Al pulsar el botón de abajo, podrás validar tu estatus y conectar tus plataformas.</p>
    <a href="/login" class="btn">Iniciar Verificación</a>
    <div class="footer">
      Desarrollado con ❤️ por <a href="https://github.com/iJahir" target="_blank">iJahir</a>
    </div>
  </div>
</body>
</html>
